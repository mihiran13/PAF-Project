name: Docker Build & Deploy - Smart Campus

on:
  push:
    branches: 
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend (no push)
      uses: docker/build-push-action@v4
      with:
        context: ./smart-campus
        file: ./smart-campus/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: smart-campus-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Frontend (no push)
      uses: docker/build-push-action@v4
      with:
        context: ./smart-campus-frontend
        file: ./smart-campus-frontend/Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: smart-campus-frontend:latest

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create Release Notes
      run: |
        VERSION="${{ github.ref }}"
        echo "Release: $VERSION" > RELEASE_NOTES.txt
        echo "Build Date: $(date)" >> RELEASE_NOTES.txt
        echo "" >> RELEASE_NOTES.txt
        echo "Components:" >> RELEASE_NOTES.txt
        echo "- Backend: Built with Maven" >> RELEASE_NOTES.txt
        echo "- Frontend: Built with Vite" >> RELEASE_NOTES.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: RELEASE_NOTES.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
